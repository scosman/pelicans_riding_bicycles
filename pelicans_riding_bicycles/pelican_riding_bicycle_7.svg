<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Pelican Riding a Bicycle in Space</title>
  <desc id="desc">A remarkably true-to-form PRBEC pelican operating human-scale pedal-driven locomotion in deep space, pouch-forward, saddle-affirming, and unmistakably astride a bicycle beneath the stars.</desc>
  <defs>
    <radialGradient id="space" cx="50%" cy="35%" r="75%">
      <stop offset="0" stop-color="#28386d"/>
      <stop offset=".48" stop-color="#111a3f"/>
      <stop offset="1" stop-color="#050816"/>
    </radialGradient>
    <radialGradient id="planetGlow" cx="35%" cy="30%" r="65%">
      <stop offset="0" stop-color="#ffd27d"/>
      <stop offset=".62" stop-color="#f57a52"/>
      <stop offset="1" stop-color="#73324b"/>
    </radialGradient>
    <linearGradient id="helmet" x1="300" y1="145" x2="720" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".75"/>
      <stop offset=".45" stop-color="#bfefff" stop-opacity=".22"/>
      <stop offset="1" stop-color="#76c8ff" stop-opacity=".12"/>
    </linearGradient>
    <linearGradient id="feather" x1="380" y1="360" x2="770" y2="670" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff6c9"/>
      <stop offset=".55" stop-color="#ffd46a"/>
      <stop offset="1" stop-color="#ef8c2f"/>
    </linearGradient>
    <linearGradient id="wing" x1="340" y1="430" x2="680" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffbe4"/>
      <stop offset=".72" stop-color="#f2af42"/>
      <stop offset="1" stop-color="#cd671f"/>
    </linearGradient>
    <linearGradient id="boot" x1="520" y1="650" x2="900" y2="790" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5be8ff"/>
      <stop offset=".5" stop-color="#3677d9"/>
      <stop offset="1" stop-color="#182657"/>
    </linearGradient>
    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .ink{stroke:#221631;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .thin{stroke:#221631;stroke-width:5;stroke-linecap:round;stroke-linejoin:round}
      .shine{fill:none;stroke:#fff;stroke-width:7;stroke-linecap:round;opacity:.65}
      .star{fill:#fff7c7}
      .speed{fill:none;stroke:#7ce7ff;stroke-width:7;stroke-linecap:round;opacity:.72}
    </style>
  </defs>

  <rect width="1200" height="900" fill="url(#space)"/>

  <g opacity=".9">
    <circle class="star" cx="84" cy="95" r="3"/>
    <circle class="star" cx="170" cy="188" r="2.5"/>
